<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: linear-gradient(160deg, #0f1e35 0%, #1a3050 50%, #0f1e35 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.2);
    animation: rise 0.6s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

  /* ── TOP STRIPE ── */
  .top-stripe {
    height: 6px;
    background: linear-gradient(90deg, #1a7fd4, #f47b20);
  }

  /* ── HEADER ── */
  .card-header {
    padding: 28px 28px 20px;
    text-align: center;
    border-bottom: 1px solid #f0f4f8;
  }
  .logo { height: 72px; width: auto; object-fit: contain; }
  .company-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #8a96a8; margin-top: 6px;
  }

  /* ── SECTION ── */
  .section { padding: 22px 28px; border-bottom: 1px solid #f0f4f8; }
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: #b0bac8; margin-bottom: 14px;
    text-align: center;
  }

  /* ── BIG PHONE ── */
  .phone-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.8rem; font-weight: 900;
    text-align: center; line-height: 1; letter-spacing: -0.01em;
    color: #1a2235; margin-bottom: 16px;
  }
  .phone-btns { display: flex; gap: 12px; }
  .btn-call, .btn-sms {
    flex: 1; padding: 16px 10px; border-radius: 14px; border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 800; letter-spacing: 0.06em;
    cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.18s; position: relative; overflow: hidden;
  }
  .btn-call::before, .btn-sms::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,0.18),transparent 60%);
    pointer-events:none;
  }
  .btn-call {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: white; font-size: 1.25rem;
    box-shadow: 0 4px 16px rgba(22,163,74,0.35);
  }
  .btn-call:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(22,163,74,0.45); }
  .btn-sms {
    background: linear-gradient(135deg, #1a7fd4, #0f5fa0);
    color: white; font-size: 1.25rem;
    box-shadow: 0 4px 16px rgba(26,127,212,0.35);
  }
  .btn-sms:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,127,212,0.45); }

  /* ── SERVICES ── */
  .services {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .svc {
    background: #f8fafc;
    border: 1.5px solid #e8edf4;
    border-radius: 14px; padding: 14px 10px;
    text-align: center; transition: all 0.18s;
  }
  .svc:hover { border-color: rgba(26,127,212,0.3); background:#f0f5ff; }
  .svc-img { height: 36px; width: auto; object-fit: contain; mix-blend-mode: multiply; display:block; margin: 0 auto 8px; }
  .svc-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    color: #1a2235; letter-spacing: 0.03em;
  }

  /* ── INFO ── */
  .info-row {
    display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  }
  .info-item { text-align: center; }
  .info-icon { font-size: 1.4rem; margin-bottom: 4px; }
  .info-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem; font-weight: 700; color: #1a2235;
  }
  .info-sub { font-size: 0.72rem; color: #8a96a8; margin-top: 1px; }

  /* ── ESTIMATE BTN ── */
  .estimate-wrap { padding: 20px 28px; }
  .btn-estimate {
    display: block; width: 100%; padding: 18px;
    border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #f47b20, #ff9a45);
    color: white; text-decoration: none; text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem; font-weight: 900; letter-spacing: 0.08em;
    box-shadow: 0 6px 20px rgba(244,123,32,0.4);
    transition: all 0.18s; position: relative; overflow: hidden;
  }
  .btn-estimate::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,0.18),transparent 55%);
    pointer-events:none;
  }
  .btn-estimate:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(244,123,32,0.5); }
  .btn-estimate .btn-sub {
    display: block; font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.1em; opacity: 0.85; margin-top: 2px;
    text-transform: uppercase;
  }

  /* ── FOOTER ── */
  .card-footer {
    background: #1a2235; padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-text {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
  }
  .footer-lang {
    background: rgba(26,127,212,0.25); border: 1px solid rgba(26,127,212,0.4);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; font-weight: 700; color: #93c5fd; letter-spacing: 0.06em;
  }

  /* ── BOTTOM STRIPE ── */
  .bottom-stripe {
    height: 4px;
    background: linear-gradient(90deg, #f47b20, #1a7fd4);
  }
</style>
