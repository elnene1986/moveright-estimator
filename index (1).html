<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoveRight Delivery – Estimate Your Move</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a7fd4; --blue-dark: #0f5fa0;
    --orange: #f47b20; --orange-light: #ff9a45;
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f0f3f7;
    --border: #e2e8f0;
    --text: #1a2235;
    --text2: #4a5568;
    --text3: #8a96a8;
    --success: #16a34a;
    --successbg: #f0fdf4;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.1), 0 8px 28px rgba(0,0,0,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* TOP BAR */
  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .logo-img { height: 46px; width: auto; object-fit: contain; }

  /* STEPPER */
  .stepper { display: flex; align-items: center; gap: 3px; }
  .step-pill { display: flex; align-items: center; gap: 5px; padding: 5px 11px 5px 6px; border-radius: 24px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; transition: all 0.3s; white-space: nowrap; }
  .step-pill.done { background: var(--successbg); color: var(--success); }
  .step-pill.active { background: var(--blue); color: white; }
  .step-pill.pending { background: var(--surface2); color: var(--text3); }
  .step-dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
  .step-pill.done .step-dot { background: var(--success); color: white; }
  .step-pill.active .step-dot { background: rgba(255,255,255,0.25); color: white; }
  .step-pill.pending .step-dot { background: var(--border); color: var(--text3); }
  .step-sep { width: 10px; height: 1px; background: var(--border); }

  /* LANG TOGGLE */
  .lang-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { padding: 5px 12px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text3); font-family: 'Barlow',sans-serif; letter-spacing: 0.05em; transition: all 0.2s; }
  .lang-btn.active { background: var(--blue); color: white; border-radius: 18px; }

  /* PROGRESS */
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--orange)); transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

  .container { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }
  .fade-in { animation: fadeIn 0.3s ease forwards; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* STEP HEADER */
  .step-label { font-size: 11px; color: var(--orange); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
  .step-title { font-family: 'Barlow Condensed',sans-serif; font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 5px; color: var(--text); }
  .step-sub { color: var(--text2); font-size: 0.88rem; line-height: 1.5; }
  .step-header { margin-bottom: 26px; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 24px; margin-bottom: 14px; box-shadow: var(--shadow); transition: box-shadow 0.2s; }
  .card:hover { box-shadow: var(--shadow-md); }
  .card-title { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }

  /* CATEGORY TABS */
  .cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .cat-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); cursor: pointer; font-size: 11px; font-weight: 700; font-family: 'Barlow',sans-serif; letter-spacing: 0.04em; transition: all 0.15s; background: var(--surface); color: var(--text2); }
  .cat-tab:hover { border-color: var(--blue); color: var(--blue); background: rgba(26,127,212,0.05); }
  .cat-tab.active { background: var(--blue); color: white; border-color: var(--blue); }

  /* FURNITURE GRID */
  .furniture-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 18px; }
  .furn-card { padding: 11px 13px; border-radius: 12px; cursor: pointer; background: var(--surface); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; transition: all 0.18s; user-select: none; }
  .furn-card:hover { border-color: var(--blue); background: rgba(26,127,212,0.04); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,127,212,0.1); }
  .furn-card.selected { background: rgba(26,127,212,0.07); border-color: var(--blue); box-shadow: 0 4px 12px rgba(26,127,212,0.15); }
  .furn-info { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .furn-icon { font-size: 1.3rem; flex-shrink: 0; }
  .furn-name { font-size: 0.8rem; font-weight: 600; line-height: 1.3; color: var(--text); }
  .furn-note { font-size: 0.67rem; color: #d97706; margin-top: 1px; }
  .qty-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: 6px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid var(--border); cursor: pointer; background: var(--surface2); color: var(--text); font-size: 15px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow',sans-serif; transition: all 0.15s; }
  .qty-btn:hover { background: var(--blue); border-color: var(--blue); color: white; }
  .qty-val { color: var(--blue); font-weight: 800; font-size: 13px; min-width: 16px; text-align: center; }
  .add-plus { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text3); display: flex; align-items: center; justify-content: center; font-size: 17px; }

  /* CART */
  .cart-summary { background: linear-gradient(135deg, #e8f0fc, #f0f5ff); border-radius: 14px; padding: 18px 22px; margin-bottom: 18px; border: 1px solid rgba(26,127,212,0.2); box-shadow: var(--shadow); }
  .cart-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .cart-pieces { font-family: 'Barlow Condensed',sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .cart-tier-badge { display: inline-flex; margin-left: 9px; background: var(--blue); color: white; padding: 2px 9px; border-radius: 18px; font-size: 10px; font-weight: 700; vertical-align: middle; }
  .cart-rate-val { font-family: 'Barlow Condensed',sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--orange); }
  .cart-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .cart-pill { background: rgba(26,127,212,0.1); border: 1px solid rgba(26,127,212,0.2); border-radius: 7px; padding: 3px 9px; font-size: 10px; color: var(--blue); font-weight: 600; }

  /* FORMS */
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { background: var(--surface2); border-radius: 11px; padding: 13px 15px; border: 1px solid var(--border); }
  .form-label { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; font-weight: 700; text-transform: uppercase; margin-bottom: 7px; display: block; }
  select, input[type="text"], input[type="date"], input[type="tel"], textarea {
    width: 100%; padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text); font-family: 'Barlow',sans-serif;
    font-size: 13px; font-weight: 500; outline: none; transition: border-color 0.2s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,127,212,0.1); }
  textarea { resize: vertical; }

  /* ZIP */
  .zip-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .zip-box { background: var(--surface); border-radius: 14px; padding: 18px 20px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  .zip-lbl { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; font-weight: 700; text-transform: uppercase; margin-bottom: 9px; }
  .zip-code { font-family: 'Barlow Condensed',sans-serif; font-size: 1.7rem; font-weight: 800; margin-bottom: 3px; color: var(--text); }
  .zip-sub { font-size: 11px; color: var(--text3); }
  .zip-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--successbg); border: 1px solid #bbf7d0; border-radius: 7px; padding: 4px 9px; font-size: 10px; color: var(--success); font-weight: 700; margin-top: 7px; }
  .zip-input { width: 100%; font-family: 'Barlow Condensed',sans-serif; font-size: 1.7rem; font-weight: 800; border: none; background: transparent; color: var(--text); outline: none; padding: 0; }
  .zip-err { font-size: 11px; color: #dc2626; margin-top: 4px; font-weight: 600; }
  .miles-result { border-radius: 12px; padding: 13px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 11px; border: 1.5px solid; }
  .miles-result.ok { background: var(--successbg); border-color: #bbf7d0; }
  .miles-result.over { background: #fff7ed; border-color: #fed7aa; }

  /* COUNTER */
  .counter-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .counter-btn { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: all 0.2s; box-shadow: var(--shadow); }
  .counter-btn:hover { border-color: var(--blue); color: var(--blue); }
  .counter-val { font-family: 'Barlow Condensed',sans-serif; font-size: 1.4rem; font-weight: 700; min-width: 56px; text-align: center; color: var(--blue); }

  /* HELPER */
  .helper-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .helper-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 18px 12px; cursor: pointer; transition: all 0.2s; text-align: center; color: var(--text); font-family: 'Barlow',sans-serif; box-shadow: var(--shadow); }
  .helper-btn:hover { border-color: var(--blue); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .helper-btn.active { border-color: var(--orange); background: #fff7ed; box-shadow: 0 4px 16px rgba(244,123,32,0.15); transform: translateY(-2px); }

  /* ADDONS */
  .addons-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px,1fr)); gap: 9px; }
  .addon-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 11px; padding: 12px 14px; cursor: pointer; transition: all 0.2s; color: var(--text); font-family: 'Barlow',sans-serif; display: flex; align-items: center; gap: 10px; text-align: left; box-shadow: var(--shadow); }
  .addon-btn:hover { border-color: var(--blue); box-shadow: var(--shadow-md); }
  .addon-btn.active { border-color: var(--orange); background: #fff7ed; }
  .addon-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.62rem; transition: all 0.2s; color: transparent; }
  .addon-btn.active .addon-check { background: var(--orange); border-color: var(--orange); color: white; }
  .addon-name { font-weight: 600; font-size: 0.83rem; color: var(--text); }
  .addon-price { color: var(--orange); font-size: 0.74rem; margin-top: 1px; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .btn-primary { padding: 13px 30px; border-radius: 12px; border: none; cursor: pointer; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; font-family: 'Barlow Condensed',sans-serif; font-size: 0.95rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; box-shadow: 0 4px 14px rgba(26,127,212,0.3); transition: all 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,127,212,0.4); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-orange { padding: 13px 30px; border-radius: 12px; border: none; cursor: pointer; background: linear-gradient(135deg, var(--orange), var(--orange-light)); color: white; font-family: 'Barlow Condensed',sans-serif; font-size: 0.95rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; box-shadow: 0 4px 14px rgba(244,123,32,0.3); transition: all 0.2s; }
  .btn-orange:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(244,123,32,0.4); }
  .btn-ghost { padding: 13px 20px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); font-family: 'Barlow Condensed',sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
  .btn-copy { padding: 13px 20px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Barlow Condensed',sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
  .btn-copy:hover { border-color: var(--blue); }
  .btn-copy.copied { background: var(--successbg); border-color: var(--success); color: var(--success); }

  /* QUOTE */
  .quote-hero { background: linear-gradient(140deg, #f8faff 0%, #eef3fc 100%); border: 2px solid rgba(26,127,212,0.25); border-radius: 20px; padding: 28px 30px; margin-bottom: 14px; box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
  .quote-hero::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle, rgba(244,123,32,0.08),transparent 70%); pointer-events:none; }
  .quote-hero::after  { content:''; position:absolute; bottom:-40px; left:-40px; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle, rgba(26,127,212,0.06),transparent 70%); pointer-events:none; }
  .quote-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .quote-amount { font-family: 'Barlow Condensed',sans-serif; font-size: 3.2rem; font-weight: 800; line-height: 1; color: var(--text); }
  .quote-amount .dollar { color: var(--orange); font-size: 2rem; vertical-align: top; margin-top: 6px; display: inline-block; }
  .quote-badge { background: rgba(26,127,212,0.1); border: 1px solid rgba(26,127,212,0.2); border-radius: 12px; padding: 11px 14px; text-align: right; }
  .quote-badge-label { color: var(--blue); font-size: 10px; letter-spacing: 0.1em; font-weight: 700; }
  .quote-badge-val { color: var(--text); font-weight: 800; font-size: 14px; margin-top: 2px; }
  .quote-badge-sub { color: var(--text3); font-size: 10px; margin-top: 1px; }
  .breakdown { border-top: 1px solid var(--border); padding-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .brow { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
  .brow .bl { color: var(--text2); }
  .brow .ba { font-weight: 600; color: var(--text); }
  .brow.total { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; font-weight: 700; font-size: 0.92rem; }
  .brow.total .bl { color: var(--text); font-weight: 700; }
  .brow.total .ba { color: var(--orange); font-size: 1.05rem; }
  .items-box { background: var(--surface); border-radius: 14px; padding: 17px 20px; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: var(--shadow); }
  .items-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .item-pill { background: rgba(26,127,212,0.08); border-radius: 7px; padding: 4px 10px; font-size: 11px; color: var(--blue); font-weight: 600; border: 1px solid rgba(26,127,212,0.15); }
  .items-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--text3); }
  .disclaimer { background: #fffbeb; border: 1.5px solid #fde68a; border-radius: 11px; padding: 11px 14px; margin-bottom: 18px; display: flex; gap: 8px; align-items: flex-start; font-size: 11px; color: #92400e; line-height: 1.5; }
  .info-pills { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
  .pill { background: rgba(26,127,212,0.07); border: 1px solid rgba(26,127,212,0.15); border-radius: 16px; padding: 4px 11px; font-size: 10px; color: var(--blue); display: flex; align-items: center; gap: 4px; font-weight: 600; }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }
  .warn-box { display: none; margin-top: 11px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 9px; padding: 10px 14px; font-size: 0.8rem; color: #c2410c; }
  .pulse { animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  @media (max-width:540px) { .input-grid,.zip-row,.helper-grid { grid-template-columns:1fr; } .stepper { display:none; } }
</style>
</head>

let LANG = 'en';
const S = {
  step:1, items:[], cat:'All',
  zip:'', miles:null, zipErr:'',
  pflo:0, dflo:0,
  extraHr:0, helper:true, addons:{},
  name:'', phone:'', date:'', notes:'',

// ── LANG ──────────────────────────────────────────────────────
function setLang(l) {
  LANG = l;
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-es').classList.toggle('active', l==='es');
  render();
}
function t() { return T[LANG]; }
function furnName(item) { return LANG==='es' ? (FURN_ES[item.n]||item.n) : item.n; }
function furnNote(item) { return LANG==='es' ? item.note_es : item.note_en; }
function tierInfo(idx) { return t().tiers[idx]; }

// ── HELPERS ───────────────────────────────────────────────────
const pieces = () => S.items.reduce((a,i)=>a+i.qty,0);
function getTierIdx() {
  const p = pieces();
  for(let i=0;i<TIER_MAX.length;i++) if(p<=TIER_MAX[i]) return i;
  return 3;
}
const baseR = () => { const m=TIER_MULTS[getTierIdx()]; return {lo:Math.round(90*m), hi:Math.round(110*m)}; };

function estHrs() {
  const diff = S.items.reduce((a,i)=>a+i.d*i.qty,0);
  let h = 1 + diff*0.2;
  [S.pflo,S.dflo].forEach(f=>{ if(f>0&&f<4) h+=f*0.25; if(f===4) h+=0.15; });
  const em = Math.max(0,(S.miles||0)-FREE_MI);
  h += em*3/60;
  return Math.max(1, h+S.extraHr);
}

function guestMiles(z) {
  const d = Math.abs(parseInt(z)-parseInt(ORIG));
  if(d===0) return 2;
  if(d<50)  return 5+(d%9);
  if(d<200) return 14+(d%16);
  return Math.min(28+(d%30),80);
}

function buildQuote() {
  const tx = t();
  const tidx = getTierIdx();
  const tier = tierInfo(tidx);
  const br = baseR();
  const em = Math.max(0,(S.miles||0)-FREE_MI);
  const eh = estHrs();
  const bh = Math.max(0,eh-FREE_HR);
  let lo=br.lo, hi=br.hi;
  const rows=[];

  rows.push({lbl: tx.baseRateRow(tier.label, pieces(), FREE_MI, FREE_HR), lo:br.lo, hi:br.hi});

  if(S.helper) {
    rows.push({lbl: tx.helperIncl, note:true});
  } else {
    lo-=HLP_HI; hi-=HLP_LO;
    rows.push({lbl: tx.soloRow, lo:-HLP_HI, hi:-HLP_LO, save:true});
  }

  if(em>0) {
    const ml=Math.round(em*MI_LO), mh=Math.round(em*MI_HI);
    lo+=ml; hi+=mh;
    rows.push({lbl: tx.mileageRow(em,FREE_MI,MI_LO,MI_HI), lo:ml, hi:mh});
  }

  if(bh>0) {
    const hl=Math.round(bh*HR_LO), hh=Math.round(bh*HR_HI);
    lo+=hl; hi+=hh;
    rows.push({lbl: tx.laborRow(bh.toFixed(1),HR_LO,HR_HI,S.helper), lo:hl, hi:hh});
  }

  [{f:S.pflo,loc:tx.floorPickup},{f:S.dflo,loc:tx.floorDrop}].forEach(({f,loc})=>{
    if(f>0&&f<4){const fl=f*ST_LO,fh=f*ST_HI; lo+=fl; hi+=fh; rows.push({lbl:tx.stairRow(loc,f,ST_LO,ST_HI), lo:fl, hi:fh});}
    if(f===4) rows.push({lbl:tx.elevRow(loc), note:true});
  });

  const addons = t().addons;
  for(const [id,v] of Object.entries(S.addons)) {
    lo+=v.lo; hi+=v.hi;
    const a=addons.find(x=>x.id===id);
    rows.push({lbl:`${a.ic} ${a.n}`, lo:v.lo, hi:v.hi});
  }

  return {lo, hi, rows, tierIdx:tidx, tier, eh, bh, em};
}

// ── RENDER ────────────────────────────────────────────────────
function go(step) { S.step=step; render(); }
function render() {
  const tx = t();
  document.getElementById('prog').style.width=`${((S.step-1)/3)*100}%`;
  const st=document.getElementById('stepper');
  st.innerHTML=tx.steps.map((l,i)=>{
    const n=i+1, cls=S.step>n?'done':S.step===n?'active':'pending';
    const sep=i<3?'<div class="step-sep"></div>':'';
    return `<div class="step-pill ${cls}"><div class="step-dot">${cls==='done'?'✓':n}</div>${l}</div>${sep}`;
  }).join('');

  const app=document.getElementById('app');
  app.className='fade-in'; void app.offsetWidth;
  const fns=[null,s1,s2,s3,s4];
  app.innerHTML=fns[S.step]();
  bind();
}

  const tx=t();

  return `

        <div class="zip-lbl">${tx.pickupOrigin}</div>
        <div class="zip-code">${ORIG}</div>
        <div class="zip-sub">${tx.lasVegas}</div>
        <div class="zip-badge">${tx.baseIncl}</div>
      </div>
      <div class="zip-box" style="border-color:${S.zipErr?'rgba(248,113,113,.5)':'rgba(26,127,212,.18)'}">
        <div class="zip-lbl">${tx.destZip}</div>
        <input class="zip-input" id="zip-inp" type="text" maxlength="5" placeholder="e.g. 89101" value="${S.zip}" autocomplete="off">
        ${S.zipErr?`<div class="zip-err">${S.zipErr}</div>`:`<div class="zip-sub">${tx.zipHint}</div>`}
      </div>
    </div>
    ${S.miles!==null?`<div class="miles-result ${ok?'ok':'over'}">
      <span style="font-size:1.3rem">${ok?'✅':'📍'}</span>
      <div>
        <div style="font-weight:700;font-size:13px;color:${ok?'#4ade80':'var(--orange)'}">~${S.miles} mi</div>
        <div style="font-size:11px;color:var(--gray);margin-top:2px">${ok
          ? tx.withinBase(FREE_MI)
          : tx.overBase(em, Math.round(em*MI_LO), Math.round(em*MI_HI))
        }</div>
      </div>
    </div>`:''}
    <div class="btn-row">
      <button class="btn-ghost" id="btn-b2">${tx.backBtn}</button>
      <button class="btn-primary" id="btn-zip">${tx.checkBtn}</button>
    </div>`;
}

// STEP 3 ──────────────────────────────────────────────────────
function s3() {
  const tx=t();
  const eh=estHrs();
  const floors=tx.floors;
  const addons=tx.addons;
  return `
    <div class="step-header">
      <div class="step-label">${tx.stepOf(3,4)}</div>
      <div class="step-title">${tx.s3Title}</div>
      <div class="step-sub">${tx.s3Sub}</div>
    </div>
    <div class="card">
      <div class="card-title">${tx.floorAccess}</div>
      <div class="input-grid">
        <div class="form-group"><label class="form-label">${tx.pickupFloor}</label>
          <select id="pf">${floors.map((l,i)=>`<option value="${i}"${S.pflo===i?' selected':''}>${l}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">${tx.dropoffFloor}</label>
          <select id="df">${floors.map((l,i)=>`<option value="${i}"${S.dflo===i?' selected':''}>${l}</option>`).join('')}</select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">${tx.helperTitle}</div>
      <p style="color:var(--gray);font-size:.85rem;margin-bottom:13px">${tx.helperNote}</p>
      <div class="helper-grid">
        <button class="helper-btn${S.helper?' active':''}" id="hlp-y">
          <div style="font-size:1.4rem;margin-bottom:6px">👷</div>
          <div style="font-weight:700;font-size:.9rem;margin-bottom:3px">${tx.withHelper}</div>
          <div style="color:var(--orange);font-size:.76rem">${tx.helperPrice(HLP_LO,HLP_HI)}</div>
          <div style="color:var(--gray);font-size:.71rem;margin-top:3px">${tx.helperBase}</div>
        </button>
        <button class="helper-btn${!S.helper?' active':''}" id="hlp-n">
          <div style="font-size:1.4rem;margin-bottom:6px">🙋</div>
          <div style="font-weight:700;font-size:.9rem;margin-bottom:3px">${tx.soloDriver}</div>
          <div style="color:#4ade80;font-size:.76rem">${tx.soloSave(HLP_LO,HLP_HI)}</div>
          <div style="color:var(--gray);font-size:.71rem;margin-top:3px">${tx.soloNote}</div>
        </button>
      </div>
      <div class="warn-box" id="hlp-warn">${tx.helperWarn}</div>
    </div>
    <div class="card">
      <div class="card-title">${tx.timeTitle}</div>
      <div class="input-grid">
        <div>
          <div style="font-size:10px;color:var(--gray);letter-spacing:.1em;font-weight:700;text-transform:uppercase;margin-bottom:7px">${tx.autoHrs}</div>
          <div id="auto-est" style="font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;color:var(--blue)">${eh.toFixed(1)} hrs</div>
          <div style="font-size:11px;color:var(--gray);margin-top:3px">${tx.autoHrsSub}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--gray);letter-spacing:.1em;font-weight:700;text-transform:uppercase;margin-bottom:7px">${tx.extraBuf}</div>
          <div class="counter-row">
            <button class="counter-btn" id="hr-m">−</button>
            <div class="counter-val" id="hr-v">${S.extraHr===0?tx.autoVal:'+'+S.extraHr+'h'}</div>
            <button class="counter-btn" id="hr-p">+</button>
          </div>
          <div style="font-size:11px;color:var(--gray);margin-top:5px">${tx.extraBufSub}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">${tx.addonsTitle}</div>
      <div class="addons-grid">${addons.map(a=>`
        <button class="addon-btn${S.addons[a.id]?' active':''}" data-adn="${a.id}">
          <div class="addon-check">✓</div>
          <div><div class="addon-name">${a.ic} ${a.n}</div><div class="addon-price">${a.p}</div></div>
        </button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">${tx.custTitle}</div>
      <div class="input-grid" style="margin-bottom:11px">
        <div class="form-group"><label class="form-label">${tx.custName}</label>
          <input type="text" id="c-name" placeholder="${tx.namePlaceholder}" value="${S.name}"></div>
        <div class="form-group"><label class="form-label">${tx.custPhone}</label>
          <input type="tel" id="c-phone" placeholder="${tx.phonePlaceholder}" value="${S.phone}"></div>
      </div>
      <div class="input-grid">
        <div class="form-group"><label class="form-label">${tx.moveDate}</label>
          <input type="date" id="c-date" value="${S.date}"></div>
        <div class="form-group"><label class="form-label">${tx.notesLabel}</label>
          <textarea id="c-notes" rows="2" placeholder="${tx.notesPlaceholder}">${S.notes}</textarea></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" id="btn-b3">${tx.backBtn}</button>
      <button class="btn-orange" id="btn-quote">${tx.generateBtn}</button>
    </div>`;
}

// STEP 4 ──────────────────────────────────────────────────────
function s4() {
  const tx=t();
  const q=S.quote; if(!q) return '';
  const rowsHtml = q.rows.map(r=>{
    let amt;
    if(r.note)      amt=`<span class="ba" style="color:#4ade80">${tx.included}</span>`;
    else if(r.save) amt=`<span class="ba" style="color:#4ade80">−$${Math.abs(r.lo)}–$${Math.abs(r.hi)}</span>`;
    else            amt=`<span class="ba">$${r.lo}${r.lo!==r.hi?'–$'+r.hi:''}</span>`;
    return `<div class="brow"><span class="bl">${r.lbl}</span>${amt}</div>`;
  }).join('') +
  `<div class="brow total"><span class="bl">${tx.totalRow}</span><span class="ba">$${q.lo} – $${q.hi}</span></div>`;

  const floors=tx.floors;
  const pl=floors[S.pflo], dl=floors[S.dflo];
  const pills=S.items.map(i=>`<span class="item-pill">${i.ic} ${i.qty>1?i.qty+'× ':''}${furnName(i)}</span>`).join('');

  return `
    <div class="step-header">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="step-label" style="margin:0">${tx.estimateReady}</div>
        <span class="pulse" style="width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block"></span>
      </div>
      <div class="step-title">${S.name ? tx.nameEstimate(S.name) : tx.yourEstimate}</div>
      <div class="step-sub">${ORIG} → ${S.zip} · ~${S.miles} mi${S.date?' · '+S.date:''}</div>
    </div>
    <div class="quote-hero">
      <div class="quote-top">
        <div>
          <div style="font-size:10px;color:var(--gray);letter-spacing:.12em;font-weight:700;text-transform:uppercase;margin-bottom:7px">${tx.estTotal}</div>
          <div class="quote-amount"><span class="dollar">$</span>${q.lo} – $${q.hi}</div>
        </div>
        <div class="quote-badge">
          <div class="quote-badge-label">${tx.jobSize}</div>
          <div class="quote-badge-val">${q.tier.label}</div>
          <div class="quote-badge-sub">${q.tier.sub}</div>
        </div>
      </div>
      <div class="breakdown">${rowsHtml}</div>
    </div>
    <div class="items-box">
      <div style="font-size:10px;color:var(--gray);letter-spacing:.1em;font-weight:700;margin-bottom:11px">${tx.itemsLabel(pieces(), q.eh.toFixed(1))}</div>
      <div class="items-pills">${pills}</div>
      <div class="items-meta">
        <span>🏢 ${pl} → ${dl}</span>
        ${S.phone?`<span>📞 ${S.phone}</span>`:''}
        ${S.notes?`<span>📝 ${S.notes}</span>`:''}
      </div>
    </div>
    <div class="disclaimer">
      <span style="flex-shrink:0">⚠️</span>
      <span>${tx.disclaimer}</span>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" id="btn-b4">${tx.adjustBtn}</button>
      <button class="btn-copy${S.copied?' copied':''}" id="btn-cp">${S.copied?tx.copiedBtn:tx.copyBtn}</button>
      <button class="btn-orange" id="btn-new">${tx.newBtn}</button>
    </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────
function bind() {
  const $=id=>document.getElementById(id);
  const tx=t();

  document.querySelectorAll('.cat-tab').forEach(b=>b.addEventListener('click',()=>{S.cat=b.dataset.cat;render();}));
  document.querySelectorAll('.furn-card').forEach(c=>c.addEventListener('click',()=>{
    const item=FURNITURE.find(f=>f.n===c.dataset.furn);
    const ex=S.items.find(i=>i.n===item.n);
    if(ex) ex.qty++; else S.items.push({...item,qty:1});
    render();
  }));
  document.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation(); const name=b.dataset.rm;
    const ex=S.items.find(i=>i.n===name);
    if(!ex) return; if(ex.qty<=1) S.items=S.items.filter(i=>i.n!==name); else ex.qty--;
    render();
  }));
  document.querySelectorAll('[data-ad]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation(); const item=FURNITURE.find(f=>f.n===b.dataset.ad);
    const ex=S.items.find(i=>i.n===item.n); if(ex) ex.qty++;
    render();
  }));
  if($('btn-n1')) $('btn-n1').addEventListener('click',()=>{ if(pieces()>0) go(2); });

  if($('zip-inp')) {
    $('zip-inp').addEventListener('input',e=>{S.zip=e.target.value.replace(/\D/g,''); S.zipErr=''; S.miles=null;});
    $('zip-inp').addEventListener('keydown',e=>{ if(e.key==='Enter') doZip(); });
    setTimeout(()=>{ try{$('zip-inp').focus();}catch(e){} }, 50);
  }
  if($('btn-zip')) $('btn-zip').addEventListener('click',doZip);
  if($('btn-b2'))  $('btn-b2').addEventListener('click',()=>go(1));

  if($('pf')) $('pf').addEventListener('change',e=>{ S.pflo=parseInt(e.target.value); warnHelper(); refreshEst(); });
  if($('df')) $('df').addEventListener('change',e=>{ S.dflo=parseInt(e.target.value); warnHelper(); refreshEst(); });
  if($('hlp-y')) $('hlp-y').addEventListener('click',()=>{ S.helper=true; render(); });
  if($('hlp-n')) $('hlp-n').addEventListener('click',()=>{ S.helper=false; render(); warnHelper(); });
  if($('hr-m')) $('hr-m').addEventListener('click',()=>{
    S.extraHr=Math.max(0,+(S.extraHr-0.5).toFixed(1));
    const v=$('hr-v'); if(v) v.textContent=S.extraHr===0?tx.autoVal:'+'+S.extraHr+'h'; refreshEst();
  });
  if($('hr-p')) $('hr-p').addEventListener('click',()=>{
    S.extraHr=+(S.extraHr+0.5).toFixed(1);
    const v=$('hr-v'); if(v) v.textContent=S.extraHr===0?tx.autoVal:'+'+S.extraHr+'h'; refreshEst();
  });
  document.querySelectorAll('[data-adn]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.adn, addons=t().addons, a=addons.find(x=>x.id===id);
    if(S.addons[id]) delete S.addons[id]; else S.addons[id]={lo:a.lo,hi:a.hi};
    render();
  }));
  if($('c-name'))  $('c-name').addEventListener('input', e=>S.name=e.target.value);
  if($('c-phone')) $('c-phone').addEventListener('input',e=>S.phone=e.target.value);
  if($('c-date'))  $('c-date').addEventListener('change',e=>S.date=e.target.value);
  if($('c-notes')) $('c-notes').addEventListener('input', e=>S.notes=e.target.value);
  if($('btn-b3'))  $('btn-b3').addEventListener('click',()=>go(2));
  if($('btn-quote')) $('btn-quote').addEventListener('click',()=>{ S.quote=buildQuote(); go(4); });

  if($('btn-b4'))  $('btn-b4').addEventListener('click',()=>go(3));
  if($('btn-new')) $('btn-new').addEventListener('click',reset);
  if($('btn-cp'))  $('btn-cp').addEventListener('click',doCopy);

  warnHelper();
}

function doZip() {
  const tx=t();
  if(!/^\d{5}$/.test(S.zip)) { S.zipErr=tx.zipErrMsg; render(); return; }
  S.zipErr=''; S.miles=guestMiles(S.zip);
  render();
  setTimeout(()=>{ if(S.miles!==null && S.step===2) go(3); }, 700);
}

function warnHelper() {
  const w=document.getElementById('hlp-warn'); if(!w) return;
  const big=S.items.some(i=>HEAVY.includes(i.n));
  w.style.display=(!S.helper&&big)?'block':'none';
}

function refreshEst() {
  const el=document.getElementById('auto-est');
  if(el) el.textContent=estHrs().toFixed(1)+' hrs';
}

function doCopy() {
  const q=S.quote; if(!q) return;
  const tx=t();
  const floors=tx.floors;
  const text=[
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
    `     ${tx.copyHeader}`,
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',
    S.name  && `${tx.copyCustomer} : ${S.name}`,
    S.phone && `${tx.copyPhone}    : ${S.phone}`,
    S.date  && `${tx.copyDate}     : ${S.date}`,
    `${tx.copyRoute}    : ${ORIG} → ${S.zip} (~${S.miles} mi)`,
    `${tx.copyJobSize}  : ${q.tier.label} (${pieces()} ${LANG==='es'?'piezas':'pieces'})`,
    '',
    tx.copyItems,
    ...S.items.map(i=>`  • ${furnName(i)}${i.qty>1?' ×'+i.qty:''}`),
    '',
    tx.copyPricing,
    ...q.rows.map(r=>r.save?`  ${r.lbl.padEnd(40)} −$${Math.abs(r.lo)}–$${Math.abs(r.hi)}`:
      r.note?`  ${r.lbl.padEnd(40)} ${LANG==='es'?'Incluido':'Included'}`:
      `  ${r.lbl.padEnd(40)} $${r.lo}${r.lo!==r.hi?'–$'+r.hi:''}`
    ),
    '  ─────────────────────────────────────',
    `  ${tx.copyTotal.padEnd(35)} $${q.lo} – $${q.hi}`,
    '',
    `${LANG==='es'?'Pisos':'Floors'}: ${floors[S.pflo]} → ${floors[S.dflo]}`,
    S.notes && `${LANG==='es'?'Notas':'Notes'}: ${S.notes}`,
    '',
    tx.copyFooter,
  ].filter(Boolean).join('\n');
  navigator.clipboard?.writeText(text).then(()=>{
    S.copied=true; render();
    setTimeout(()=>{S.copied=false; render();},2500);
  });
}

function reset() {
  Object.assign(S,{step:1,items:[],cat:'All',zip:'',miles:null,zipErr:'',pflo:0,dflo:0,extraHr:0,helper:true,addons:{},name:'',phone:'',date:'',notes:'',quote:null,copied:false});
  render();
}

render();
</script>
</body>
</html>
